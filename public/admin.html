<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin — wedding photos</title>
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <div class="wrap wide">
    <div class="hero">
      <div class="rings">🔑</div>
      <h1>Admin</h1>
      <div class="topnav"><a href="/gallery">← back to gallery</a></div>
    </div>

    <div class="card" id="loginCard" style="max-width:420px;margin-left:auto;margin-right:auto">
      <label class="field-label" for="password">Admin password</label>
      <input type="password" id="password" autocomplete="current-password">
      <button class="big-btn" id="loginBtn">Log in</button>
      <div class="error-note" id="loginError"></div>
    </div>

    <div id="adminArea" style="display:none">
      <a class="big-btn secondary more-btn" href="/api/admin/download-all" download>⬇️ Download every original (zip)</a>
      <div class="leader">Tap ✕ on a photo to remove it from the gallery (deletes the original too).</div>
      <div class="grid" id="grid"></div>
      <div class="empty" id="empty" style="display:none">Nothing uploaded yet.</div>
    </div>
  </div>

  <script src="/assets/admin.js"></script>
</body>
</html>
