<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin — wedding photos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/style.css?v=15">
</head>
<body>
  <img class="art tl" src="/assets/art/corner-tl.png" alt="">
  <img class="art br" src="/assets/art/rose-br.png" alt="">

  <div class="wrap wide">
    <div class="hero" id="loginHero">
      <img class="art-hero" src="/assets/art/key.png" alt="">
      <h1>Admin</h1>
      <div class="heart-divider gold">♥</div>
      <div class="topnav"><a href="/gallery">← back to gallery</a></div>
    </div>

    <div class="card" id="loginCard" style="max-width:420px;margin-left:auto;margin-right:auto">
      <label class="field-label" for="password">Enter password</label>
      <div class="input-wrap">
        <span class="input-icon"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg></span>
        <input type="password" id="password" autocomplete="current-password" placeholder="••••••••">
        <button class="toggle-eye" id="toggleEye" type="button" aria-label="Show password"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 12s3.5-6.5 10-6.5S22 12 22 12s-3.5 6.5-10 6.5S2 12 2 12Z"/><circle cx="12" cy="12" r="2.8"/></svg></button>
      </div>
      <button class="big-btn" id="loginBtn">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>
        Log in
      </button>
      <div class="error-note" id="loginError"></div>
    </div>

    <div id="adminArea" style="display:none">
      <div class="hero" style="padding-top:0">
        <h1 id="adminCouple">John &amp; Katie's Wedding</h1>
        <div class="heart-divider gold">♥</div>
        <div class="sub">Manage guest photos</div>
      </div>
      <a class="big-btn secondary" href="/api/admin/download-all" download style="max-width:420px;margin-left:auto;margin-right:auto">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0 4-4m-4 4-4-4"/><path d="M4 17v3h16v-3"/></svg>
        Download every original (zip)
      </a>
      <div class="admin-note">Tap <span class="x">✕</span> to remove a photo</div>
      <div class="masonry" id="grid"></div>
      <div class="empty" id="empty" style="display:none">Nothing uploaded yet.</div>
    </div>
  </div>

  <script src="/assets/admin.js?v=15"></script>
</body>
</html>
